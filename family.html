<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salah Times — Mesquite, TX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .wrap {
      width: 100%; max-width: 580px;
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #10b981;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.25rem;
      font-weight: 500;
    }
    h1 { font-size: 28px; font-weight: 600; color: #f0f0f0; margin-bottom: 0.3rem; }
    .sub { font-size: 14px; color: #555; margin-bottom: 0.4rem; }
    .current-time { font-size: 32px; font-weight: 500; color: #f0f0f0; font-variant-numeric: tabular-nums; margin: 0.5rem 0 0.2rem; }
    .current-date { font-size: 13px; color: #555; margin-bottom: 1.75rem; }
    hr { border: none; border-top: 1px solid #1a1a1a; margin: 1.5rem 0; }

    .next-box {
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(16,185,129,0.04));
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }
    .next-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #10b981; margin-bottom: 0.3rem; font-weight: 500; }
    .next-name { font-size: 22px; font-weight: 600; color: #f0f0f0; }
    .next-time-str { font-size: 14px; color: #888; margin-top: 0.2rem; }
    .next-countdown { text-align: right; }
    .next-countdown-num { font-size: 28px; font-weight: 600; color: #10b981; font-variant-numeric: tabular-nums; }
    .next-countdown-label { font-size: 11px; color: #555; margin-top: 0.2rem; letter-spacing: 0.08em; text-transform: uppercase; }

    .prayers { display: flex; flex-direction: column; gap: 0.6rem; }
    .prayer-row {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.3s;
    }
    .prayer-row.active {
      border-color: rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.05);
    }
    .prayer-row.passed { opacity: 0.4; }
    .prayer-left { display: flex; align-items: center; gap: 0.75rem; }
    .prayer-icon { font-size: 20px; }
    .prayer-name { font-size: 15px; font-weight: 500; color: #f0f0f0; }
    .prayer-arabic { font-size: 12px; color: #555; margin-top: 0.1rem; }
    .prayer-time-str { font-size: 16px; font-weight: 500; color: #ccc; font-variant-numeric: tabular-nums; }
    .prayer-row.active .prayer-time-str { color: #10b981; }
    .done-badge {
      font-size: 10px; color: #10b981;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 100px;
      padding: 0.2rem 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: none;
    }
    .prayer-row.passed .done-badge { display: inline-block; }

    .footer-links { margin-top: 2.5rem; display: flex; justify-content: center; gap: 1rem; }
    .btn-home {
      display: inline-block;
      padding: 0.65rem 1.25rem;
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-home:hover { color: #f0f0f0; border-color: #333; }

    .quran-verse {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-left: 3px solid #10b981;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      font-size: 14px;
      color: #888;
      line-height: 1.7;
      font-style: italic;
      text-align: left;
    }
    .quran-verse span { color: #555; font-size: 12px; display: block; margin-top: 0.4rem; font-style: normal; }

    .hijri-date { font-size: 13px; color: #10b981; margin-top: 0.2rem; margin-bottom: 1rem; }

    .test-box {
      background: #0f0f0f;
      border: 1px dashed #2a2a2a;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .test-box label { font-size: 12px; color: #666; }
    .test-box input[type="date"], .test-box input[type="time"] {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 0.4rem 0.6rem;
      color-scheme: dark;
    }
    .test-box button {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 8px;
      color: #10b981;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
    }
    .test-box button:hover { background: rgba(16,185,129,0.18); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🕌 Mesquite, Texas</div>
    <h1>Prayer Times</h1>
    <p class="sub">Calculated for Mesquite, TX ·</p>
    <div class="current-time" id="current-time">--:-- --</div>
    <div class="current-date" id="current-date">--</div>
    <div class="hijri-date" id="hijri-date">--</div>

    <div class="test-box">
      <label>Ceck the Salah for:</label>
      <input type="date" id="test-date-input">
      <button id="test-date-go">Apply</button>
      <button id="test-date-reset">Reset to Today</button>
    </div>

    <div class="next-box">
      <div>
        <div class="next-label">⏳ Next Prayer</div>
        <div class="next-name" id="next-name">--</div>
        <div class="next-time-str" id="next-time-str">--</div>
      </div>
      <div class="next-countdown">
        <div class="next-countdown-num" id="next-countdown">--:--</div>
        <div class="next-countdown-label">remaining</div>
      </div>
    </div>

    <div class="prayers-label" id="prayers-label" style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-bottom:0.75rem;text-align:left;">Today's Prayer Times</div>
    <div class="prayers" id="prayer-list"></div>

    <div class="quran-verse">
      "Indeed, prayer has been decreed upon the believers a decree of specified times."
      <span>— Surah An-Nisa 4:103</span>
    </div>

    <div class="footer-links">
      <a href="index.html" class="btn-home">🏠 Home</a>
    </div>
  </div>

<script>
// ── Prayer time calculation ( verified against known Mesquite TX times) ──
const LAT = 32.7668;   // Mesquite, TX
const LNG = -96.5992;
const TZ  = 'America/Chicago';

const PRAYERS = [
  { key: 'fajr',    name: 'Fajr',    arabic: 'الفجر',   icon: '🌙' },
  { key: 'dhuhr',   name: 'Dhuhr',   arabic: 'الظهر',   icon: '☀️' },
  { key: 'asr',     name: 'Asr',     arabic: 'العصر',   icon: '🌤️' },
  { key: 'maghrib', name: 'Maghrib', arabic: 'المغرب',  icon: '🌅' },
  { key: 'isha',    name: 'Isha',    arabic: 'العشاء',  icon: '🌟' },
];

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function fixHour(h) { h = h % 24; if (h < 0) h += 24; return h; }

// Get the current UTC offset (in hours) for a timezone, accounting for DST
function getTzOffset(date, tz) {
  const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
  const tzDate  = new Date(date.toLocaleString('en-US', { timeZone: tz }));
  return Math.round((tzDate - utcDate) / 3600000);
}

function julianDay(y, m, d) {
  if (m <= 2) { y -= 1; m += 12; }
  const a = Math.floor(y / 100);
  const b = 2 - a + Math.floor(a / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + b - 1524.5;
}

function sunPosition(jd) {
  const D = jd - 2451545.0;
  const g = toRad(((357.529 + 0.98560028 * D) % 360 + 360) % 360);
  const q = ((280.459 + 0.98564736 * D) % 360 + 360) % 360;
  const L = toRad(((q + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) % 360 + 360) % 360);
  const e = toRad(23.439 - 0.00000036 * D);
  let RA = toDeg(Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L))) / 15;
  RA = fixHour(RA);
  const dec = toDeg(Math.asin(Math.sin(e) * Math.sin(L)));
  const EqT = q / 15 - RA;
  return { dec, EqT };
}

// angle in degrees (negative = below horizon), afterNoon = true for PM side
function timeForAngle(angleDeg, dec, EqT, tzOffset, afterNoon) {
  const num = Math.sin(toRad(angleDeg)) - Math.sin(toRad(LAT)) * Math.sin(toRad(dec));
  const den = Math.cos(toRad(LAT)) * Math.cos(toRad(dec));
  const cosH = num / den;
  if (Math.abs(cosH) > 1) return null;
  const H = toDeg(Math.acos(cosH)) / 15;
  const base = afterNoon ? (12 + H) : (12 - H);
  return fixHour(base - EqT - (LNG / 15 - tzOffset));
}

function asrAngle(dec) {
  // Shafi method: shadow length factor = 1
  const x = Math.abs(LAT - dec);
  return toDeg(Math.atan(1 / (1 + Math.tan(toRad(x)))));
}

function computeTimes(date) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  const jd = julianDay(y, m, d);
  const { dec, EqT } = sunPosition(jd);
  const tzOffset = getTzOffset(date, TZ);

  const fajr    = timeForAngle(-15, dec, EqT, tzOffset, false);
  const dhuhr   = fixHour(12 - EqT - (LNG / 15 - tzOffset));
  const asrAng  = asrAngle(dec);
  const asr     = timeForAngle(asrAng, dec, EqT, tzOffset, true);
  const maghrib = timeForAngle(-0.833, dec, EqT, tzOffset, true);
  const isha    = timeForAngle(-15, dec, EqT, tzOffset, true);

  return { fajr, dhuhr, asr, maghrib, isha };
}

function decimalToTime(h) {
  if (h === null || h === undefined) return null;
  h = fixHour(h);
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return mm === 60 ? { h: (hh + 1) % 24, m: 0 } : { h: hh, m: mm };
}

function fmt12(t) {
  if (!t) return '--';
  const ampm = t.h >= 12 ? 'PM' : 'AM';
  const hh = t.h % 12 || 12;
  return `${hh}:${String(t.m).padStart(2,'0')} ${ampm}`;
}

function toMinutes(t) { return t ? t.h * 60 + t.m : null; }

function buildList(times) {
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  PRAYERS.forEach(p => {
    const t = times[p.key];
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.id = 'row-' + p.key;
    row.innerHTML = `
      <div class="prayer-left">
        <span class="prayer-icon">${p.icon}</span>
        <div>
          <div class="prayer-name">${p.name}</div>
          <div class="prayer-arabic">${p.arabic}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span class="prayer-time-str">${fmt12(t)}</span>
        <span class="done-badge">✓ done</span>
      </div>`;
    list.appendChild(row);
  });
}

function updateHighlights(times) {
  // Always based on the REAL current moment — the test date only changes which
  // day's prayer times are displayed in the list above, never this live countdown.
  const now = new Date();
  const nowInTZ = new Date(now.toLocaleString('en-US', { timeZone: TZ }));
  const nowMins = nowInTZ.getHours() * 60 + nowInTZ.getMinutes();

  let nextKey = null, nextMins = Infinity;

  PRAYERS.forEach(p => {
    const t = times[p.key];
    const m = toMinutes(t);
    const row = document.getElementById('row-' + p.key);
    if (!row || m === null) return;
    row.className = 'prayer-row';
    if (m < nowMins) {
      row.classList.add('passed');
    } else if (m < nextMins) {
      nextMins = m;
      nextKey = p.key;
    }
  });

  if (nextKey) {
    document.getElementById('row-' + nextKey).classList.add('active');
    const np = PRAYERS.find(p => p.key === nextKey);
    document.getElementById('next-name').textContent = np.name;
    document.getElementById('next-time-str').textContent = fmt12(times[nextKey]);
    const diffMins = nextMins - nowMins;
    const h = Math.floor(diffMins / 60), m = diffMins % 60;
    document.getElementById('next-countdown').textContent =
      h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
  } else {
    document.getElementById('next-name').textContent = 'Fajr (tomorrow)';
    const t = times.fajr;
    document.getElementById('next-time-str').textContent = fmt12(t);
    const tmrMins = toMinutes(t) + 24 * 60;
    const diffMins = tmrMins - nowMins;
    const h = Math.floor(diffMins / 60), m = diffMins % 60;
    document.getElementById('next-countdown').textContent =
      h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
  }
}

function updateClock() {
  // Always the real current moment — never affected by the test date picker
  const now = new Date();
  document.getElementById('current-time').textContent =
    now.toLocaleTimeString('en-US', { timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('hijri-date').textContent = '🌙 ' + gregorianToHijriString(now);
}

// ── Test-date override ──────────────────────────────────────────
// When testing, we freeze the clock at the exact date+time chosen, instead of
// letting real-world seconds keep advancing — otherwise a test at 11:51 PM
// would make every test date look like "almost midnight", breaking the
// next-prayer calculation regardless of which date was picked.
let frozenTestTime = null; // a Date (UTC instant) to use as "now", or null = live mode

function getEffectiveNow() {
  return frozenTestTime ? frozenTestTime : new Date();
}

function setupTestControls() {
  const dateInput = document.getElementById('test-date-input');
  const goBtn = document.getElementById('test-date-go');
  const resetBtn = document.getElementById('test-date-reset');

  goBtn.addEventListener('click', () => {
    if (!dateInput.value) return;
    const [y, m, d] = dateInput.value.split('-').map(Number);
    frozenTestTime = chicagoWallTimeToUtc(y, m - 1, d, 12, 0, 0); // noon, just for listing that day's times
    lastDay = null; // force recalculation
    run();
  });

  resetBtn.addEventListener('click', () => {
    frozenTestTime = null;
    dateInput.value = '';
    lastDay = null;
    run();
  });
}

// Converts a Chicago-local wall-clock time into the equivalent real UTC instant (ms),
// correctly accounting for whatever DST offset applies on that date.
function chicagoWallTimeToUtc(y, m, d, hh, mm, ss) {
  // Start with a guess assuming UTC, then correct using the actual Chicago offset for that date.
  const guessUtc = new Date(Date.UTC(y, m, d, hh, mm, ss));
  const offsetHours = getTzOffset(guessUtc, TZ); // e.g. -5 (CDT) or -6 (CST)
  return new Date(Date.UTC(y, m, d, hh - offsetHours, mm, ss));
}

// ── Hijri calendar (tabular Islamic calendar, civil/Fatimid base) ──
// Accurate to within ~1 day of local moon-sighting announcements.
function gregorianToHijriString(date) {
  // Convert Gregorian date (in TZ) to Julian Day Number
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  let jdn;
  {
    const a = Math.floor((14 - m) / 12);
    const yy = y + 4800 - a;
    const mm = m + 12 * a - 3;
    jdn = d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4)
        - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
  }

  // Islamic civil calendar epoch: JDN 1948440 = 1 Muharram 1 AH
  const islamicEpoch = 1948440;
  const daysSinceEpoch = jdn - islamicEpoch;
  let hYear = Math.floor((30 * daysSinceEpoch + 10646) / 10631);
  let startOfYear = islamicEpoch + Math.ceil(354.36667 * (hYear - 1) + 0.25 * (hYear - 1));

  // adjust precisely using cycle-based formula
  function hijriYearStartJDN(hy) {
    return islamicEpoch + (hy - 1) * 354 + Math.floor((3 + 11 * (hy - 1)) / 30);
  }
  let testYear = hYear;
  while (jdn < hijriYearStartJDN(testYear)) testYear--;
  while (jdn >= hijriYearStartJDN(testYear + 1)) testYear++;
  hYear = testYear;

  const dayOfYear = jdn - hijriYearStartJDN(hYear) + 1;
  const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29];
  // leap year gets 30 days in 12th month
  const isLeap = (11 * hYear + 14) % 30 < 11;
  if (isLeap) monthLengths[11] = 30;

  let remaining = dayOfYear;
  let hMonth = 0;
  for (let i = 0; i < 12; i++) {
    if (remaining <= monthLengths[i]) { hMonth = i; break; }
    remaining -= monthLengths[i];
  }
  const hDay = remaining;

  const monthNames = ['Muharram','Safar',"Rabi' al-Awwal","Rabi' al-Thani",
    'Jumada al-Awwal','Jumada al-Thani','Rajab',"Sha'ban",'Ramadan',
    'Shawwal',"Dhu al-Qi'dah","Dhu al-Hijjah"];

  return `${hDay} ${monthNames[hMonth]} ${hYear} AH`;
}

let cachedTimes = null;      // times for whichever date is being displayed (today, or test date)
let lastDay = null;
let realTodayTimes = null;   // ALWAYS today's real times — used only for the live countdown
let realLastDay = null;

function run() {
  // Displayed list: respects the test date if one is applied
  const now = getEffectiveNow();
  const todayStr = now.toLocaleDateString('en-US', { timeZone: TZ });

  if (todayStr !== lastDay) {
    cachedTimes = computeTimes(new Date(now.toLocaleString('en-US', { timeZone: TZ })));
    for (const k in cachedTimes) cachedTimes[k] = decimalToTime(cachedTimes[k]);
    lastDay = todayStr;
    buildList(cachedTimes);
  }

 const label = document.getElementById('prayers-label');

if (label) {
  if (frozenTestTime) {
    label.textContent =
      `Preview: ${todayStr} • 🌙 ${gregorianToHijriString(frozenTestTime)}`;
  } else {
    label.textContent = "Today's Prayer Times";
  }
}

  // Live countdown: always based on the real current date, ignoring any test override
  const realNow = new Date();
  const realTodayStr = realNow.toLocaleDateString('en-US', { timeZone: TZ });
  if (realTodayStr !== realLastDay) {
    realTodayTimes = computeTimes(new Date(realNow.toLocaleString('en-US', { timeZone: TZ })));
    for (const k in realTodayTimes) realTodayTimes[k] = decimalToTime(realTodayTimes[k]);
    realLastDay = realTodayStr;
  }

  updateClock();
  updateHighlights(realTodayTimes);
}

setupTestControls();
run();
setInterval(run, 1000);

</script>
</body>
</html>
