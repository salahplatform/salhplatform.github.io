<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 480px;
    }
    .heading {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 30px;
      font-weight: 500;
      color: #f0f0f0;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 3rem;
    }
    .line {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
    .dash { width: 80px; border-top: 1.5px dashed #333; }
    .plane { font-size: 18px; }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 1.1rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      color: #f0f0f0;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn:hover {
      background: #242424;
      border-color: #3a3a3a;
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn .emoji { margin-right: 0.6rem; font-size: 18px; }
    .footer {
      margin-top: 3rem;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="heading">Salahuddin's Pages</p>
    <h1>Welcome 🏠</h1>
    <p class="sub">Choose a page to visit</p>

    <div class="line">
      <div class="dot"></div>
      <div class="dash"></div>
      <span class="plane">✈</span>
      <div class="dash"></div>
      <div class="dot"></div>
    </div>

    <div class="buttons">
     
      <a href="mohammed.html" class="btn"><span class="emoji">⭐</span> Mohammed</a>
      <a href="family.html" class="btn"><span class="emoji">🏡</span> Family</a>
       <a href="ayah.html" class="btn"><span class="emoji">🌸</span> Ayah</a>
    </div>

    <p class="footer">salahplatform.github.io</p>
  </div>
</body>
</html>
